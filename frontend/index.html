<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Capture demand before you ship. Referral-powered waitlists, real-time analytics, and instant embeds." />
    <meta name="theme-color" content="#0a0f1e" />
    <link rel="canonical" href="https://nexuswait.io" />
    <title>NexusWait — Futuristic Waitlist Builder</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NexusWait" />
    <meta property="og:title" content="NexusWait — Futuristic Waitlist Builder" />
    <meta property="og:description" content="Capture demand before you ship. Referral-powered waitlists, real-time analytics, and instant embeds." />
    <meta property="og:url" content="https://nexuswait.io" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="NexusWait — Futuristic Waitlist Builder" />
    <meta name="twitter:description" content="Capture demand before you ship. Referral-powered waitlists, real-time analytics, and instant embeds." />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "NexusWait",
      "applicationCategory": "BusinessApplication",
      "description": "Referral-powered waitlist platform with real-time analytics and instant embeds.",
      "url": "https://nexuswait.io",
      "operatingSystem": "Web",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "publisher": { "@type": "Organization", "name": "NexusWait", "url": "https://nexuswait.io" }
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <script>
      (function() {
        var theme = localStorage.getItem('nexuswait_theme');
        var resolved = theme;
        if (!theme || theme === 'system') {
          resolved = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        if (theme === null) resolved = 'dark';
        document.documentElement.classList.add(resolved);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
