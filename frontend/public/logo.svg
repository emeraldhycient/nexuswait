<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Left stroke: bottom-left to top-right (cyan) -->
  <line x1="6" y1="28" x2="20" y2="4" stroke="#00e8ff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right stroke: top-left to bottom-right (magenta) -->
  <line x1="12" y1="4" x2="26" y2="28" stroke="#e839ff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Nexus intersection dot -->
  <circle cx="16" cy="16" r="2.2" fill="#ffffff"/>
</svg>
